version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: leetcord-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leetcord
    ports:
      - "5432:5432"
    volumes:
      - leetcord-db-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file:
      - .env
    depends_on:
      - db
    command: ["pnpm", "--filter", "@leetcord/api", "start"]

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    env_file:
      - .env
    depends_on:
      - db
      - api
    command: ["pnpm", "--filter", "@leetcord/bot", "start"]

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file:
      - .env
    depends_on:
      - db
      - api
    command: ["pnpm", "--filter", "@leetcord/worker", "start"]

volumes:
  leetcord-db-data:
